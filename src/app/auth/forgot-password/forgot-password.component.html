<div class="fondo-pagina">
  <div class="texto-fondo">GYMBROS</div>
  <div class="tarjeta-login">
    <section class="seccion-bienvenida">
      <h2>¿Olvidaste tu contraseña?</h2>
      <p>Introducí tu correo para recibir las instrucciones de restablecimiento</p>
    </section>
    <div class="cuerpo-formulario">
      <div class="campo-input">
        <i class="far fa-envelope icono-izq"></i>
        <input type="email" placeholder="Correo Electrónico">
      </div>
      <button class="boton-principal" (click)="showModal = true">
        ENVIAR ENLACE
      </button>
      <div class="separador">
        <span>ó</span>
      </div>
      <div class="pie-registro">
        <a routerLink="/login">Volver al inicio de sesión</a>
      </div>
      <div class="linea-inferior"></div>
    </div>
  </div>

  @if (showModal) {
    <div class="modal-overlay">
      <div class="modal-card">
        <div class="modal-icon">
          <i class="fas fa-paper-plane"></i>
        </div>
        <h3>¡Correo Enviado!</h3>
        <p>Hemos enviado un enlace de recuperación a <strong>tu-emailgym.com</strong>. Revisá tu bandeja de entrada y spam.</p>
        <button class="btn-modal" (click)="showModal = false">ENTENDIDO</button>
      </div>
    </div>
  }
</div>

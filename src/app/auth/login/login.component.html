<div class="fondo-pagina">
  <div class="texto-fondo">GYMBROS</div>

  <div class="tarjeta-login">
    <section class="seccion-bienvenida">
      <h2>Bienvenido</h2>
      <p>Ingresá tus credenciales para continuar</p>
    </section>

    <div class="cuerpo-formulario">

      <form (ngSubmit)="login()">

        <div class="campo-input">
          <i class="far fa-envelope icono-izq"></i>
          <input
            type="email"
            placeholder="Correo Electrónico"
            name="email"
            [(ngModel)]="loginData.email"
            required>
        </div>

        <div class="campo-input">
          <i class="fas fa-lock icono-izq"></i>
          <input
            type="password"
            placeholder="Contraseña"
            name="password"
            [(ngModel)]="loginData.password"
            required>
          <i class="icono-der"></i>
        </div>

        <div class="acciones">
          <a routerLink="/forgot-password" class="link-olvido">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <button type="submit" class="boton-principal">
          INICIAR SESIÓN
        </button>

      </form>

      <div class="separador">
        <span>ó</span>
      </div>

      <div class="pie-registro">
        <span>¿No tenés cuenta?</span>
        <a routerLink="/register"><strong>Registrate</strong></a>
      </div>

      <div class="linea-inferior"></div>

    </div>
  </div>
</div>

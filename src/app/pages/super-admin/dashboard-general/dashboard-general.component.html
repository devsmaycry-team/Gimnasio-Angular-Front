<div class="dashboard-wrapper">

  <!-- Métricas -->
  <div class="metrics-grid">
    <div class="metric-card">
      <span class="metric-label">Sedes totales</span>
      <span class="metric-value">{{cantGimnasios}}</span>
      <span class="metric-sub">Sincronizado</span>
    </div>
    <div class="metric-card">
      <span class="metric-label">Staff entrenadores</span>
      <span class="metric-value">42</span>
      <span class="metric-sub">Central / Norte</span>
    </div>
  </div>

  <!-- Tabla de sedes -->
  <div class="section">
    <h2 class="section-title">Estado multi-gimnasio</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nombre sede</th>
            <th>Dirección</th>
            <th>Teléfono</th>
            <th>Código</th>
            <th class="text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (gym of gimnasios; track gym.id){
            <tr>
              <td><strong>{{gym.nombre}}</strong></td>
              <td class="muted">{{gym.direccion}}</td>
              <td class="muted">{{gym.telefono}}</td>
              <td class="muted">{{gym.codigoGym}}</td>
              <td class="text-right">
              <div class="actions">
                <button class="btn-primary" (click)="accederSede(gym.id!)">Acceder</button>
                <button class="btn-ghost">Editar</button>
              </div>
            </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

</div>

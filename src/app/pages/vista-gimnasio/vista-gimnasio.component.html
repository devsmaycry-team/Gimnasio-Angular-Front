<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-dumbbell"></i>
      <span>PANEL</span>
      <small class="badge-admin">SUPER ADMIN</small>
    </div>

    <div class="sidebar-scroll">

      <!-- GIMNASIOS -->
      <div class="admin-group">
        <p class="group-title">Gimnasios</p>
        <a routerLink="infogym" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-building"></i> Datos gimnasio
        </a>
        <a routerLink="planes" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-id-card"></i> Planes
        </a>
      </div>

           <!-- USUARIOS -->
      <div class="admin-group">
        <p class="group-title">Usuarios</p>
        <a routerLink="usuarios" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-building"></i> Gestion usuarios
        </a>
      </div>

      <!-- SOCIOS -->
      <div class="admin-group">
        <p class="group-title">Socios</p>
        <a routerLink="socios" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-users"></i> Socios
        </a>
        <a routerLink="membresias" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-id-badge"></i> Membresías
        </a>
        <a routerLink="pagos" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-credit-card"></i> Pagos
        </a>
        <a routerLink="asistencias" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-check-circle"></i> Asistencias
        </a>
        <a routerLink="mediciones" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-weight"></i> Mediciones
        </a>
      </div>

      <!-- ENTRENAMIENTO -->
      <div class="admin-group">
        <p class="group-title">Entrenamiento</p>
        <a routerLink="entrenadores" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-user-tie"></i> Entrenadores
        </a>
        <a routerLink="rutinas" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-dumbbell"></i> Rutinas
        </a>
        <a routerLink="ejercicios" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-running"></i> Ejercicios
        </a>
      </div>

      <!-- CLASES -->
      <div class="admin-group">
        <p class="group-title">Clases</p>
        <a routerLink="clases" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-chalkboard-teacher"></i> Clases
        </a>
        <a routerLink="horarios" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-clock"></i> Horarios
        </a>
        <a routerLink="inscripciones" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-user-plus"></i> Inscripciones
        </a>
      </div>

      <!-- SEGURIDAD -->
      <div class="admin-group">
        <p class="group-title">Seguridad</p>
        <a routerLink="usuarios" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-users-cog"></i> Usuarios
        </a>
        <a routerLink="auditoria" routerLinkActive="active-link" class="admin-item">
          <i class="fas fa-file-alt"></i> Auditoría
        </a>
      </div>

    </div>

    <div class="sidebar-user">
      <div class="user-pill">
        <i class="fas fa-user-circle"></i>
        <span>{{ getNombreUsuario() }}</span>
      </div>
      <button (click)="logout()" class="btn-exit">
        <i class="fas fa-power-off"></i>
        Salir
      </button>
    </div>
  </aside>

  <main class="admin-main-content">
    <router-outlet></router-outlet>
  </main>
</div>
